                <a href="" class="

                    <a href="" class="about-me__link" target="_blank">

                    </a>
                    <a href="" class="about-me__link" target="_blank">

                    </a>
                    <a href="" class="about-me__link" target="_blank">
                        <i class="fa-solid fa-file-pdf"></i>

        </div>
    </div>
    <figure class="about-me__img--container">
        <img src="./assets/undraw_progressive-web-app_c4uq.svg" class="about-me__img"alt="progressive web app illustration">
